<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 正式アイコン(B案・2026-07-10オーナー承認の参照画像をベクター化): トマトオレンジ地×クリームのふた付き鍋 -->
  <rect width="512" height="512" rx="118" fill="#d9480f"/>
  <!-- 湯気(中央だけ少し低い位置から) -->
  <g fill="none" stroke="#fffdf8" stroke-width="24" stroke-linecap="round">
    <path d="M199 150 q-18 -28 0 -56"/>
    <path d="M256 158 q-18 -28 0 -56"/>
    <path d="M313 150 q-18 -28 0 -56"/>
  </g>
  <g fill="#fffdf8">
    <!-- ふたのつまみ(首つき) -->
    <circle cx="256" cy="196" r="15"/>
    <!-- ふた(低いドーム・胴よりわずかに広い) -->
    <path d="M132 240 C132 214 188 206 256 206 C324 206 380 214 380 240 Q380 248 370 248 H142 Q132 248 132 240 Z"/>
    <!-- 取っ手(左右・丸い端のスタブ) -->
    <rect x="92" y="262" width="56" height="34" rx="17"/>
    <rect x="364" y="262" width="56" height="34" rx="17"/>
    <!-- 胴(底の角を大きく丸めた深鍋) -->
    <path d="M140 256 h232 v56 a80 98 0 0 1 -80 98 h-72 a80 98 0 0 1 -80 -98 z"/>
  </g>
</svg>
